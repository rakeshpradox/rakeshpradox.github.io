<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Animated Homepage</title>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Brand</div>
        <ul class="nav-links">
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
        </ul>
    </nav>

    <header class="hero">
        <h1 class="slide-right">Welcome to Our World</h1>
        <p class="fade-in">Experience the motion and design.</p>
        <button class="btn-scale">Get Started</button>
    </header>

    <section class="features">
        <div class="card slide-up">Feature 1</div>
        <div class="card slide-up">Feature 2</div>
        <div class="card slide-up">Feature 3</div>
    </section>

</body>
</html>
